version: 2
name: french-mcp-catalog
displayName: French MCP Catalog

registry:
    boamp-mcp:
        dateAdded: "2026-04-06T00:00:00Z"
        description: Recherche d'appels d'offres BOAMP (marchés publics français)
        image: aurethedev/boamp-mcp:latest
    title: BOAMP MCP
        type: server
        tools:
            - name: search_avis
            - name: get_avis
            - name: search_by_cpv
            - name: search_by_acheteur
            - name: list_recent
            - name: get_deadlines

    datagouv-mcp:
        dateAdded: "2026-04-07T00:00:00Z"
        description: Accès aux données publiques françaises via data.gouv.fr
        image: aurethedev/datagouv-mcp:latest
        title: data.gouv.fr MCP
        type: server
        tools:
            - name: search_datasets
            - name: search_dataservices
            - name: get_dataset_info
            - name: list_dataset_resources
            - name: get_resource_info
            - name: query_resource_data
            - name: get_dataservice_info
            - name: get_dataservice_openapi_spec
            - name: get_metrics

    recherche-entreprise-mcp:
        dateAdded: "2026-04-07T00:00:00Z"
        description: Recherche d'entreprises françaises via l'API officielle recherche-entreprises.api.gouv.fr (SIREN, nom, localisation, filtres métier)
        image: aurethedev/recherche-entreprise-mcp:latest
        title: Recherche Entreprises MCP
        type: server
        tools:
            - name: get_entreprise_by_siren
            - name: search_entreprises
            - name: search_entreprises_near_point
            - name: search_by_dirigeant
            - name: search_by_activite

    insee-mcp:
        dateAdded: "2026-04-07T00:00:00Z"
        description: Accès aux APIs INSEE — annuaire SIRENE des entreprises et établissements, métadonnées géographiques (COG) et nomenclatures (NAF), séries temporelles macroéconomiques (BDM)
        image: aurethedev/insee-mcp:latest
        title: INSEE MCP
        type: server
        tools:
            - name: sirene_get_siren
            - name: sirene_get_siret
            - name: sirene_search_companies
            - name: sirene_search_establishments
            - name: sirene_get_informations
            - name: sirene_get_succession_links
            - name: meta_get_naf_classe
            - name: meta_get_naf_sous_classe
            - name: meta_get_commune
            - name: meta_get_departement
            - name: meta_get_region
            - name: meta_get_pays
            - name: meta_list_communes
            - name: meta_list_departements
            - name: meta_list_regions
            - name: bdm_get_series

    ted-mcp:
        dateAdded: "2026-04-06T00:00:00Z"
        description: Recherche d'appels d'offres européens via TED Europa (Tenders Electronic Daily)
        image: aurethedev/ted-mcp:latest
        title: TED Europa MCP
        type: server
        tools:
            - name: search_notices
            - name: get_notice
            - name: get_notice_xml
            - name: get_notice_docs_url
            - name: get_sdk_versions
